<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona BOiL - CPM Visualizer</title>
    
    <!-- Biblioteki zewnętrzne do rysowania grafu -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-node-html-label@1.2.1/dist/cytoscape-node-html-label.min.js"></script>
    
    <style>
        /* Stylistyka strony i rozmiary obszarów roboczych */
        body { font-family: sans-serif; padding: 20px; }

        /* Wygląd kontenerów */
        #cy {
            width: 100%;
            height: 600px;
            border: 1px solid #ccc;
            margin-top: 20px;
            display: block;
        }
        #critical-path-text { margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Wizualizacja Harmonogramu CPM</h1>

    <!-- visualizer.js renderuje interaktywny graf sieciowy -->
    <div id="cy"></div>
    <!-- ścieżka krytyczna -->
    <div id="critical-path-text"></div>
    <!-- Legenda -->
    <div id="graph-legend-container" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; background-color: #f9f9f9; max-width: 400px; font-family: sans-serif;">
        <h3 style="margin-top: 0;">Legenda Węzła CPM</h3>
        <div id="graph-legend-content"></div>
    </div>

    <!-- Wykres Gantta-->
    <div id="gantt-outer-container" style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; font-family: sans-serif;">
        <h2>Wykres Gantta (Harmonogram)</h2>
        <div id="gantt-chart-content"></div>
    </div>

    <!-- Skrypty logiczne (Dane -> Obliczenia -> Test) -->
    <script src="graph.js"></script>
    <script src="solver.js"></script>
    <script src="test.js"></script>
    
    <!-- Skrypt wizualny (Rysowanie wszystkiego na ekranie) -->
    <script src="visualizer.js"></script>

</body>
</html>
